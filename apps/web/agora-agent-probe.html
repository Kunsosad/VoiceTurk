<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>VoiceTurk Agora Agent Probe</title>
  </head>
  <body>
    <main>
      <h1>Agora Agent Studio RTC probe</h1>
      <p>Paste the values emitted by <code>probe_agora_agent_join.py --print-client-token</code>.</p>
      <form id="probe-form">
        <label>App ID <input id="app-id" required /></label>
        <label>Channel <input id="channel" required /></label>
        <label>Contributor UID <input id="contributor-uid" required /></label>
        <label>Contributor token <textarea id="token" required></textarea></label>
        <label>Expected agent UID <input id="agent-uid" required /></label>
        <button type="submit">Join, publish mic, and observe</button>
        <button id="leave" type="button">Leave</button>
      </form>
      <p id="status" role="status" aria-live="polite">Idle</p>
      <pre id="events" aria-live="polite"></pre>
    </main>
    <script type="module" src="/src/debug/agora-agent-probe.ts"></script>
  </body>
</html>
